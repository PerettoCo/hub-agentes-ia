upstream auth_service {
    server opencode-auth:3000;
}

# Basic Auth para autenticar nos containers OpenCode
# Credencial: opencode / WmwZz%h!W^R^bpDx!xBt373@
map $http_cookie $opencode_auth {
    default "Basic b3BlbmNvZGU6V213WnolaCFXXlJeYnBEeCF4QnQzNzNA";
}

server {
    listen 80;

    charset utf-8;
    client_max_body_size 100m;

    # ─── Auth check (chamado internamente pelo auth_request) ───
    location = /auth-check {
        internal;
        proxy_pass http://auth_service/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ─── Páginas de login/logout ───
    location /login {
        proxy_pass http://auth_service;
    }
    location /logout {
        proxy_pass http://auth_service;
    }
    location /api/login {
        proxy_pass http://auth_service;
    }
    location /api/logout {
        proxy_pass http://auth_service;
    }
    location /api/me {
        proxy_pass http://auth_service;
    }
    location /static/ {
        proxy_pass http://auth_service;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Tudo que vai pro OpenCode (requer auth) ───
    location / {
        auth_request /auth-check;
        auth_request_set $opencode_target $upstream_http_x_opencode_target;

        error_page 401 = @login;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $opencode_auth;

        # SSE sem buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_pass $opencode_target;
    }

    location @login {
        return 302 /login;
    }
}
