# OpenAuth Gateway — Roteia por Host header, verifica cookie direto no nginx (sem auth_request subrequest)

# ─── Auth Service (login/dashboard) — sem checagem de auth ───
server {
    listen 80;
    server_name ia.fvmarketing.com.br;
    client_max_body_size 100m;

    location / {
        proxy_pass http://opencode-auth:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Template para subdominios com autenticacao ───
# Verifica presenca do cookie connect.sid direto no nginx.
# Se nao tiver cookie, redireciona pro login.
# O cookie so e criado pelo auth service apos login bem-sucedido (saveUninitialized: false).
# Nao faz subrequest — evita problema de forwarding de cookie.

# ─── Marcos Luciano ───
server {
    listen 80;
    server_name marcos.fvmarketing.com.br;
    client_max_body_size 100m;

    location / {
        if ($http_cookie !~ "connect\.sid") {
            return 302 https://ia.fvmarketing.com.br/login?redirect=https://$host$request_uri;
        }
        proxy_pass http://opencode-marcos:4096;
        proxy_set_header Authorization "Basic b3BlbmNvZGU6V213WnolaCFXXlJeYnBEeCF4QnQzNzNA";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

