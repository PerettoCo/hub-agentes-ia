version: '3.8'

volumes:
  opencode-data-marcos:
  opencode-data-fhelipe:
  opencode-data-csm2:
  opencode-data-csm3:

services:
  # ─── Login Portal ───
  opencode-login:
    build:
      context: ./opencode-login
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-CHAVE_SESSAO_32CARACTERES_AQUI}
      OPENCODE_HOST: 2.25.148.214
      LITELLM_TARGET: https://litellm.fvmarketing.com.br
      PUBLIC_URL: ${PUBLIC_URL:-https://ia.fvmarketing.com.br}
      NODE_ENV: production
    restart: unless-stopped

  # ─── OpenCode - Marcos Luciano ───
  opencode-marcos:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    ports:
      - '4090:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_MARCOS:-sk-marcos-virtual-key}
    volumes:
      - opencode-data-marcos:/home/node/.local/share/opencode
      - ./opencode-login/opencode-config/marcos.json:/home/node/.config/opencode/opencode.json:ro
    restart: unless-stopped

  # ─── OpenCode - Fhelipe Aranha ───
  opencode-fhelipe:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    ports:
      - '4091:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_FHELIPE:-sk-fhelipe-virtual-key}

    volumes:
      - opencode-data-fhelipe:/home/node/.local/share/opencode
      - ./opencode-login/opencode-config/fhelipe.json:/home/node/.config/opencode/opencode.json:ro
    restart: unless-stopped

  # ─── OpenCode - CSM 2 ───
  opencode-csm2:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    ports:
      - '4092:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_CSM2:-sk-csm2-virtual-key}

    volumes:
      - opencode-data-csm2:/home/node/.local/share/opencode
      - ./opencode-login/opencode-config/csm2.json:/home/node/.config/opencode/opencode.json:ro
    restart: unless-stopped

  # ─── OpenCode - CSM 3 ───
  opencode-csm3:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    ports:
      - '4093:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_CSM3:-sk-csm3-virtual-key}

    volumes:
      - opencode-data-csm3:/home/node/.local/share/opencode
      - ./opencode-login/opencode-config/csm3.json:/home/node/.config/opencode/opencode.json:ro
    restart: unless-stopped
