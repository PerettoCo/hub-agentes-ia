version: '3.8'

services:
  opencode-web:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    container_name: opencode-web
    ports:
      - "4096:4096"
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_MARCOS}
      OPENAI_API_KEY: ${LITELLM_KEY_MARCOS}
      OPENAI_BASE_URL: https://litellm.fvmarketing.com.br/v1
      OPENCODE_DISABLE_MODELS_FETCH: "true"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode_workspace:/workspace
      - opencode_config:/home/node/.config/opencode
      - ./opencode-login/opencode-config/marcos.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.opencode.rule=Host(`opencode.fvmarketing.com.br`)
      - traefik.http.services.opencode.loadbalancer.server.port=4096
      - traefik.http.routers.opencode.service=opencode
      - traefik.http.routers.opencode.tls=true
      - traefik.http.routers.opencode.tls.certresolver=letsencrypt
    restart: unless-stopped

volumes:
  opencode_workspace:
  opencode_config:

networks:
  dokploy-network:
    external: true
