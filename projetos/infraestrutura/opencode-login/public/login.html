<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 Company · Hub de Agentes de IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0c;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
    }

    .panel-left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a0c 0%, #1a0a0c 40%, #0d0d10 100%);
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(230,57,70,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(230,57,70,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .panel-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .dots {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    @keyframes dotFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
      50% { transform: translateY(-20px) scale(1.5); opacity: 0.35; }
    }

    .dot {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #e63946;
      border-radius: 50%;
      opacity: 0.15;
      animation: dotFloat 4s ease-in-out infinite;
    }

    .dot:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; animation-duration: 4.2s; }
    .dot:nth-child(2) { top: 30%; right: 25%; animation-delay: -0.8s; animation-duration: 3.8s; }
    .dot:nth-child(3) { bottom: 25%; left: 30%; animation-delay: -1.6s; animation-duration: 4.5s; }
    .dot:nth-child(4) { top: 50%; left: 50%; animation-delay: -2.4s; animation-duration: 3.5s; }
    .dot:nth-child(5) { bottom: 35%; right: 20%; animation-delay: -3.2s; animation-duration: 4s; }
    .dot:nth-child(6) { top: 70%; left: 15%; animation-delay: -1s; animation-duration: 4.8s; }
    .dot:nth-child(7) { top: 20%; right: 40%; animation-delay: -2s; animation-duration: 3.6s; }
    .dot:nth-child(8) { bottom: 15%; right: 35%; animation-delay: -3s; animation-duration: 4.3s; }
    .dot:nth-child(9) { top: 45%; right: 15%; animation-delay: -0.5s; animation-duration: 3.9s; }
    .dot:nth-child(10) { bottom: 50%; left: 40%; animation-delay: -1.5s; animation-duration: 4.1s; }

    .promo {
      position: relative;
      z-index: 1;
      max-width: 480px;
      text-align: center;
    }

    .promo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .promo-badge span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }

    .promo h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .promo h2 em {
      font-style: normal;
      color: #e63946;
    }

    .promo p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .promo-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .promo-stat {
      text-align: center;
    }

    .promo-stat .num {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    .promo-stat .label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    .panel-right {
      width: 480px;
      min-width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: #ffffff;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
    }

    .logo {
      margin-bottom: 40px;
    }

    .logo img {
      height: 80px;
      width: auto;
    }

    .logo h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1d1d1f;
      margin-top: 20px;
      letter-spacing: -0.01em;
    }

    .logo p {
      font-size: 0.8rem;
      color: #86868b;
      margin-top: 4px;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e8e8ed;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #1d1d1f;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #ffffff;
    }

    .form-group input:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }

    .form-group input::placeholder { color: #aeaeb2; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn:hover { background: #d32d3a; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      display: none;
      font-size: 0.82rem;
      color: #e63946;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(230,57,70,0.06);
      border-radius: 10px;
      align-items: center;
      gap: 8px;
    }

    .error.visible { display: flex; }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: #aeaeb2;
    }

    @media (max-width: 900px) {
      body { flex-direction: column; }
      .panel-left {
        padding: 48px 32px;
        min-height: auto;
        flex-shrink: 0;
      }
      .promo { max-width: 100%; }
      .promo h2 { font-size: 1.6rem; }
      .promo-stats { gap: 24px; }
      .panel-right {
        width: 100%;
        min-width: unset;
        padding: 40px 32px;
        flex: 1;
      }
    }

    @media (max-width: 600px) {
      .panel-left { padding: 40px 20px; }
      .promo h2 { font-size: 1.4rem; }
      .promo p { font-size: 0.9rem; }
      .promo-stats { gap: 16px; }
      .promo-stat .num { font-size: 1.3rem; }
      .panel-right { padding: 32px 20px; }
      .logo img { height: 64px; }
      .logo h1 { font-size: 1rem; }
    }

    @media (max-width: 400px) {
      .promo h2 { font-size: 1.2rem; }
      .promo-stats { flex-direction: column; gap: 12px; }
      .promo p { font-size: 0.85rem; }
      .panel-left { padding: 32px 16px; }
      .panel-right { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="panel-left">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="promo">
      <div class="promo-badge">
        <span></span>
        V4 Company Peretto &amp; Co
      </div>
      <h2>Hub de Agentes de <em>IA</em></h2>
      <p>
        Dados integrados, rotinas automatizadas<br>
        e mentes livres para estratégia.
      </p>
      <div class="promo-stats">
        <div class="promo-stat">
          <div class="num">36</div>
          <div class="label">Agentes de IA</div>
        </div>
        <div class="promo-stat">
          <div class="num">102</div>
          <div class="label">Skills especializadas</div>
        </div>
        <div class="promo-stat">
          <div class="num">8</div>
          <div class="label">Times integrados</div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel-right">
    <div class="login-box">
      <div class="logo">
        <img src="logo.png" alt="V4 Company">
        <h1>Acessar plataforma</h1>
        <p>Hub de Agentes de IA</p>
      </div>

      <div class="error" id="error">
        <span id="errorText">Credenciais inválidas</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="seu.nome" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">Entrar</button>
      </form>

      <div class="footer">
        Ambiente seguro · Apenas usuários autorizados
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const error = document.getElementById('error');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.classList.remove('visible');
      const u = username.value.trim();
      const p = password.value;
      if (!u || !p) { showError('Preencha todos os campos'); return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (!res.ok) { showError('Usuário ou senha incorretos'); return; }
        window.location.href = '/dashboard';
      } catch (err) { showError('Erro de conexão'); }
      finally { submitBtn.disabled = false; submitBtn.textContent = 'Entrar'; }
    });

    function showError(msg) {
      errorText.textContent = msg;
      error.classList.add('visible');
    }
  </script>
</body>
</html>
