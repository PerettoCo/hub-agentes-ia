<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 Company · Sair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0c;
      color: #fff;
      min-height: 100vh;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(230,57,70,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(139,26,26,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.4) 0%, transparent 80%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 460px;
      padding: 48px 40px;
    }

    .logo {
      margin-bottom: 40px;
    }

    .logo img {
      height: 72px;
      width: auto;
      filter: brightness(0.9);
    }

    .icon-box {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 32px;
      background: rgba(230,57,70,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-box::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid rgba(230,57,70,0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }

    .icon-box svg {
      width: 32px;
      height: 32px;
      color: #e63946;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: #fff;
    }

    p {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    p strong {
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-primary {
      width: 100%;
      padding: 16px 32px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: #d32d3a;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(230,57,70,0.25);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      width: 100%;
      padding: 14px 32px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.03);
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .loading-spinner.active {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }
      h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/static/logo.png" alt="V4 Company">
    </div>

    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </div>

    <h1>Tem certeza que deseja sair?</h1>
    <p>
      Você está prestes a encerrar sua sessão no<br>
      <strong id="subdomainDisplay">Hub de Agentes</strong>.
    </p>

    <div class="actions">
      <button class="btn-primary" id="confirmBtn">
        <span class="btn-text">
          <span id="btnLabel">Sim, sair</span>
          <span class="loading-spinner" id="spinner"></span>
        </span>
      </button>
      <a href="/" class="btn-secondary">Cancelar</a>
    </div>
  </div>

  <script>
    const subdomainEl = document.getElementById('subdomainDisplay');
    const confirmBtn = document.getElementById('confirmBtn');
    const btnLabel = document.getElementById('btnLabel');
    const spinner = document.getElementById('spinner');

    async function init() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/login';
          return;
        }
        const user = await res.json();
        if (user.opencodeUrl) {
          const domain = new URL(user.opencodeUrl).hostname;
          subdomainEl.textContent = domain;
        }
      } catch {
        window.location.href = '/login';
      }
    }

    confirmBtn.addEventListener('click', async () => {
      confirmBtn.disabled = true;
      btnLabel.textContent = 'Saindo...';
      spinner.classList.add('active');

      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    init();
  </script>
</body>
</html>
