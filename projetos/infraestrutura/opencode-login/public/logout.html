<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 Company · Desconectado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0c;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 48px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(230,57,70,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.6rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn:hover { background: #d32d3a; }
    .btn-sec {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-sec:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    .logo {
      margin-bottom: 40px;
    }
    .logo img {
      height: 80px;
      width: auto;
      filter: grayscale(0.5);
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/logo.png" alt="V4 Company">
    </div>
    <div class="icon">&#10003;</div>
    <h1>Desconectado</h1>
    <p>
      Você foi desconectado do Hub de Agentes.<br>
      Sua sessão foi encerrada com seguranca.
    </p>
    <a href="/login" class="btn">Entrar novamente</a>
    <br>
    <a href="/login" class="btn-sec">Ir para o login</a>
  </div>
</body>
</html>
