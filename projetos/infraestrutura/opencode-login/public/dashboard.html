<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 Company · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0c;
      color: #ffffff;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-left img {
      height: 36px;
      width: auto;
    }

    .topbar-left span {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 0.82rem;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e63946, #8b1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: #fff;
    }

    .user-info .name { font-weight: 600; color: #fff; }
    .user-info .squad { color: rgba(255,255,255,0.4); font-size: 0.75rem; }

    .btn-logout {
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: rgba(230,57,70,0.15);
      border-color: #e63946;
      color: #e63946;
    }

    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 32px;
    }

    .greeting {
      margin-bottom: 48px;
    }

    .greeting h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .greeting p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 32px;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(230,57,70,0.06) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      border-color: rgba(230,57,70,0.3);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    .card-icon.terminal { background: rgba(34,197,94,0.1); color: #22c55e; }
    .card-icon.lightbulb { background: rgba(250,204,21,0.1); color: #facc15; }

    .card h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .card p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      position: relative;
      z-index: 1;
    }

    .card .hint {
      margin-top: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 48px;
      color: rgba(255,255,255,0.3);
    }

    .loading.active { display: block; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      display: none;
      text-align: center;
      padding: 48px;
    }

    .error-state.active { display: block; }

    .error-state .code {
      font-size: 3rem;
      font-weight: 800;
      color: rgba(230,57,70,0.2);
      line-height: 1;
      margin-bottom: 8px;
    }

    .error-state p { color: rgba(255,255,255,0.4); font-size: 0.9rem; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .topbar { padding: 12px 16px; flex-direction: column; gap: 12px; }
      .topbar-right { width: 100%; justify-content: space-between; }
      .main { padding: 32px 16px; }
      .greeting h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo-white.png" alt="V4">
      <span>Hub de Agentes</span>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="avatar">M</div>
        <div class="user-info">
          <div class="name" id="userName">—</div>
          <div class="squad" id="userSquad">—</div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn">Sair</button>
    </div>
  </div>

  <div class="loading active" id="loading">
    <div class="spinner"></div>
    <span>Carregando...</span>
  </div>

  <div class="error-state" id="errorState">
    <div class="code">401</div>
    <p>Redirecionando para login...</p>
  </div>

  <div class="main" id="dashboardContent" style="display:none">
    <div class="greeting">
      <img src="/static/logo-peretto-red.png" alt="Peretto & Co" style="height:48px;width:auto;margin-bottom:24px">
      <h1>Olá, <span id="userDisplayName">—</span></h1>
      <p>Selecione um serviço para acessar</p>
    </div>

    <div class="grid" id="targetsGrid">
      <a class="card" href="#" target="_blank" id="card-opencode">
        <div class="card-icon terminal">&#xFE0F;</div>
        <h3>OpenCode Web</h3>
        <p>Interface do agente de IA com sessão individual</p>
        <div class="hint">Abrir em nova aba</div>
      </a>
      <a class="card" href="#" target="_blank" id="card-litellm">
        <div class="card-icon lightbulb">&#x1F4A1;</div>
        <h3>LiteLLM Proxy</h3>
        <p>Proxy de modelos LLM com chave virtual</p>
        <div class="hint">Abrir em nova aba</div>
      </a>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const meRes = await fetch('/api/me');
        if (!meRes.ok) { showError(); return; }
        const me = await meRes.json();

        const targetsRes = await fetch('/api/targets');
        if (!targetsRes.ok) { showError(); return; }
        const data = await targetsRes.json();

        document.getElementById('loading').classList.remove('active');
        document.getElementById('dashboardContent').style.display = 'block';

        document.getElementById('userName').textContent = me.name;
        document.getElementById('userSquad').textContent = me.squad;
        document.getElementById('userDisplayName').textContent = me.name.split(' ')[0];
        document.getElementById('avatar').textContent = me.name.charAt(0);

        const targets = data.targets || [];
        const ocTarget = targets.find(t => t.name === 'OpenCode Web');
        const llTarget = targets.find(t => t.name === 'LiteLLM Proxy');

        if (ocTarget) document.getElementById('card-opencode').href = ocTarget.url;
        if (llTarget) document.getElementById('card-litellm').href = llTarget.url;

      } catch (err) {
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('errorState').classList.add('active');
      setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>
