<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sair · Hub de Agentes IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0c;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box { text-align: center; }
    .box h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
    .box p { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
    .box a {
      display: inline-block;
      padding: 12px 24px;
      background: #e63946;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .box a:hover { background: #d32d3a; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Você saiu</h2>
    <p>Sessão encerrada com sucesso.</p>
    <a href="/login">Entrar novamente</a>
  </div>
</body>
</html>
