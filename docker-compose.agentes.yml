      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?}
      OPENAI_API_KEY: ${LITELLM_KEY_FHELIPE:?}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_DADOS_URL: ${SUPABASE_DADOS_URL:-}
      SUPABASE_DADOS_KEY: ${SUPABASE_DADOS_KEY:-}
      EKYTE_TOKEN: ${EKYTE_TOKEN_FHELIPE:-}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      HUB_USERNAME: fhelipe.aranha
    networks:
      - default
      - dokploy-network
    volumes:
      - opencode-data-fhelipe:/workspace/.local/share/opencode
      - opencode-workspace-fhelipe:/workspace
      - ./infra/entrypoint.sh:/entrypoint.sh:ro
      - ./infra/auth/opencode-config/fhelipe.aranha.json:/workspace/.config/opencode/opencode.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --user=opencode --password=\"$OPENCODE_SERVER_PASSWORD\" http://localhost:4096/global/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

