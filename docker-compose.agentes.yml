volumes:
  opencode-data-marcos:
  opencode-data-fhelipe:
  opencode-data-csm2:
  opencode-data-csm3:

networks:
  v4-infra:
    driver: bridge
  dokploy-network:
    external: true

services:
  # ─── Login Portal ───
  opencode-login:
    build:
      context: projetos/infraestrutura/opencode-login
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-CHAVE_SESSAO_32CARACTERES_AQUI}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      PUBLIC_URL: ${PUBLIC_URL:-https://ia.fvmarketing.com.br}
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      NODE_ENV: production
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped

  # ─── OpenCode - Marcos Luciano ───
  opencode-marcos:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    ports:
      - '4090:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_MARCOS:-sk-marcos-virtual-key}
      OPENAI_API_KEY: ${LITELLM_KEY_MARCOS:-sk-marcos-virtual-key}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode-data-marcos:/home/node/.local/share/opencode
      - ./projetos/infraestrutura/opencode-login/opencode-config/marcos.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped

  # ─── OpenCode - Fhelipe Aranha ───
  opencode-fhelipe:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    ports:
      - '4091:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_FHELIPE:-sk-fhelipe-virtual-key}
      OPENAI_API_KEY: ${LITELLM_KEY_FHELIPE:-sk-fhelipe-virtual-key}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode-data-fhelipe:/home/node/.local/share/opencode
      - ./projetos/infraestrutura/opencode-login/opencode-config/fhelipe.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped

  # ─── OpenCode - CSM 2 ───
  opencode-csm2:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    ports:
      - '4092:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_CSM2:-sk-csm2-virtual-key}
      OPENAI_API_KEY: ${LITELLM_KEY_CSM2:-sk-csm2-virtual-key}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode-data-csm2:/home/node/.local/share/opencode
      - ./projetos/infraestrutura/opencode-login/opencode-config/csm2.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - v4-infra
    restart: unless-stopped

  # ─── OpenCode - CSM 3 ───
  opencode-csm3:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    ports:
      - '4093:4096'
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_CSM3:-sk-csm3-virtual-key}
      OPENAI_API_KEY: ${LITELLM_KEY_CSM3:-sk-csm3-virtual-key}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode-data-csm3:/home/node/.local/share/opencode
      - ./projetos/infraestrutura/opencode-login/opencode-config/csm3.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped
