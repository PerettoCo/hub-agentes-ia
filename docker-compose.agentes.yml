volumes:
  opencode-data-marcos:
  opencode-data-fhelipe:
  opencode-data-lucasnunes:
  opencode-data-paolo:
  opencode-data-csm1:

networks:
  v4-infra:
    driver: bridge
  dokploy-network:
    external: true

services:
  # ─── Nginx Gateway (porta 80 — único ponto de entrada) ───
  opencode-gateway:
    build:
      context: projetos/infraestrutura/opencode-gateway
      dockerfile: Dockerfile
    ports:
      - '80'
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped
    depends_on:
      - opencode-auth
      - opencode-marcos
      - opencode-fhelipe
      - opencode-lucasnunes
      - opencode-paolo
      - opencode-csm1

  # ─── Auth Service (login/dashboard + auth-check para o gateway) ───
  opencode-auth:
    build:
      context: projetos/infraestrutura/opencode-login
      dockerfile: Dockerfile
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-CHAVE_SESSAO_32CARACTERES_AQUI}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      PUBLIC_URL: ${PUBLIC_URL:-https://ia.fvmarketing.com.br}
      NODE_ENV: production
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped

  # ─── OpenCode - Marcos Luciano ───
  opencode-marcos:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-SENHA_FORTE_OPencode}
      LITELLM_VIRTUAL_KEY: ${LITELLM_KEY_MARCOS:-sk-marcos-virtual-key}
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENCODE_DISABLE_MODELS_FETCH: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - opencode-data-marcos:/home/node/.local/share/opencode
      - ./projetos/infraestrutura/opencode-login/opencode-config/marcos.json:/home/node/.config/opencode/opencode.json:ro
    networks:
      - v4-infra
      - dokploy-network
    restart: unless-stopped

  # ─── OpenCode - Fhelipe Aranha ───
  opencode-fhelipe:
    build:
      context: projetos/infraestrutura
      dockerfile: Dockerfile.opencode
    environment:
      OPENCODE_SERVER_USERNAME: opencode
